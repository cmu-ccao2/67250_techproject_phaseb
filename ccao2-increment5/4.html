<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets</title>
  <meta name="author" content="ccao2">
  <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
  <meta name="description" content="67-272 webdev project">
  <link rel="stylesheet" href="./static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <div id="navbar-placeholder"></div>
    <script src="./static/js/navbar.js"></script>
  </header>
  <h1> 4 </h1>

  <div class="main buytickets_main">
    <section class="ticket_tables">
    <h2>Buy Tickets</h2>
    <table>
      <tr>
        <th>Ticket Type</th>
        <th>Description</th>
        <th>Price</th>
      </tr>
      <tr>
        <td>Adult</td>
        <td>General admission for ages 18 and over. Under 18 free of charge.</td>
        <td>$18</td>
      </tr>
      <tr>
        <td>Student</td>
        <td>Student ID required</td>
        <td>$10</td>
      </tr>
      <tr>
        <td>Member</td>
        <td>Member ID required</td>
        <td>$15</td>
      </tr>
    </table>

    <table>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th> </th>
      </tr>
      <tr>
        <td>April 5</td>
        <td>10:00 AM</td>
        <td><button onclick="showForm('April 5')">Add to Cart</button></td>
      </tr>
      <tr>
        <td>April 12</td>
        <td>1:00 PM</td>
        <td><button onclick="showForm('April 12')">Add to Cart</button></td>
      </tr>
      <tr>
        <td>April 19</td>
        <td>3:00 PM</td>
        <td><button onclick="showForm('April 19')">Add to Cart</button></td>
      </tr>
    </table>
  </section>
 
  <section class="ticket_form">
    <form id="ticketForm">
      <h2>Purchase Tickets</h2>

      <label for="visitDate">Selected Date:</label>
      <input type="text" id="visitDate" name="visitDate" readonly />

      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="quantity">Number of Tickets:</label>
      <input type="number" id="quantity" name="quantity" min="1" max="10" required/>

      <button type="button" onclick="submitPurchase()">Buy Tickets</button>
    </form>
  </section>
  </div>

  <footer id="footer-placeholder"></footer>
    <script src="./static/js/footer.js"></script>
</body>
</html>
